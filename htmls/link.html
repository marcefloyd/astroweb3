<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Rueda Zodiacal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- 🎥 VIDEO FONDO -->
    <video autoplay muted loop>
      <source src="assets/mibarrio2.mp4" type="video/mp4" />
    </video>

    <!-- 🔮 CONTENEDOR -->
    <div class="contenedor">
      <!-- 🌗 MEDIA RUEDA -->
      <div class="rueda-container">
        <div class="rueda" id="rueda">
          <!-- SIGNOS -->
          <div class="signo" data-link="#aries">Aries</div>
          <div class="signo" data-link="#tauro">Tauro</div>
          <div class="signo" data-link="#geminis">Géminis</div>
          <div class="signo" data-link="#cancer">Cáncer</div>
          <div class="signo" data-link="#leo">Leo</div>
          <div class="signo" data-link="#virgo">Virgo</div>
          <div class="signo" data-link="#libra">Libra</div>
          <div class="signo" data-link="#escorpio">Escorpio</div>
          <div class="signo" data-link="#sagitario">Sagitario</div>
          <div class="signo" data-link="#capricornio">Capricornio</div>
          <div class="signo" data-link="#acuario">Acuario</div>
          <div class="signo" data-link="#piscis">Piscis</div>
        </div>
      </div>
    </div>

    <!-- 📄 SECCIONES -->
    <section id="aries">Contenido Aries</section>
    <section id="tauro">Contenido Tauro</section>
    <section id="geminis">Contenido Géminis</section>

    <script src="script.js"></script>
  </body>
</html>
